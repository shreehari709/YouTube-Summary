<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI YouTube Notes Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Typography for the AI Output */
        #outputContainer h1, #outputContainer h2 { 
            font-size: 1.4rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #111827; 
        }
        #outputContainer h3 { 
            font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #1f2937; 
        }
        #outputContainer p { 
            margin-bottom: 1rem; color: #374151; line-height: 1.6;
        }
        #outputContainer ul { 
            list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #374151; 
        }
        #outputContainer ol { 
            list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; color: #374151; 
        }
        #outputContainer li { 
            margin-bottom: 0.4rem; line-height: 1.5;
        }
        #outputContainer strong { 
            font-weight: 700; color: #111827; 
        }
        #outputContainer em { 
            font-style: italic; color: #4b5563;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center p-6">

    <div class="w-full max-w-3xl bg-white rounded-xl shadow-md p-6 mt-10">
        <h1 class="text-2xl font-bold text-gray-900 mb-2 text-center">YouTube AI Notes Generator</h1>
        <p class="text-sm text-gray-500 text-center mb-6">Paste any YouTube video link to extract precise study notes instantly.</p>

        <div id="errorBox" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm font-medium rounded-lg text-center">
            </div>

        <div class="flex flex-col sm:flex-row gap-3 mb-6">
            <input type="text" id="videoUrl" placeholder="Paste YouTube Link here..." 
                   class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <button id="generateBtn" onclick="processVideo()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-3 rounded-lg transition text-sm cursor-pointer">
                Generate Notes
            </button>
        </div>

        <div id="loadingSection" class="hidden flex flex-col items-center justify-center py-10 gap-3">
            <div class="spinner"></div>
            <p class="text-sm text-gray-600 font-medium animate-pulse">Reading transcript and distilling key concepts...</p>
        </div>

        <div id="resultsSection" class="hidden border-t border-gray-100 pt-6">
            <div id="outputContainer" class="bg-gray-50 p-6 rounded-lg border border-gray-200 text-sm overflow-y-auto mb-4" style="max-height: 60vh;">
                </div>
            
            <div class="flex justify-end gap-3">
                <button onclick="clearOutput()" class="px-4 py-2 border border-gray-300 rounded-lg text-xs font-medium text-gray-700 hover:bg-gray-100 transition cursor-pointer">
                    Clear Output
                </button>
                <button onclick="downloadAsWord()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-xs font-medium transition cursor-pointer">
                    Download as Word (.doc)
                </button>
            </div>
        </div>
    </div>

    <script>
        const errorBox = document.getElementById('errorBox');

        function showError(message) {
            errorBox.textContent = message;
            errorBox.classList.remove('hidden');
        }

        function hideError() {
            errorBox.classList.add('hidden');
            errorBox.textContent = '';
        }

        async function processVideo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const loadingSection = document.getElementById('loadingSection');
            const resultsSection = document.getElementById('resultsSection');
            const outputContainer = document.getElementById('outputContainer');

            hideError(); // Clear previous errors

            if (!urlInput) {
                showError("Please paste a valid YouTube URL first!");
                return;
            }

            loadingSection.classList.remove('hidden');
            resultsSection.classList.add('hidden');
            generateBtn.disabled = true;

            try {
                const response = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();

                if (response.ok) {
                    // MAGIC HAPPENS HERE: Parse Markdown string into styled HTML
                    outputContainer.innerHTML = marked.parse(data.notes);
                    resultsSection.classList.remove('hidden');
                } else {
                    showError("Error: " + (data.detail || "Failed to compile notes. Verify captions are enabled."));
                }
            } catch (err) {
                console.error(err);
                showError("Could not connect to the server. Make sure Uvicorn is running.");
            } finally {
                loadingSection.classList.add('hidden');
                generateBtn.disabled = false;
            }
        }

        function clearOutput() {
            document.getElementById('videoUrl').value = '';
            document.getElementById('outputContainer').innerHTML = '';
            document.getElementById('resultsSection').classList.add('hidden');
            hideError();
        }

        function downloadAsWord() {
            // We grab the raw text content so the Word doc isn't filled with HTML tags
            const textData = document.getElementById('outputContainer').innerText;
            if (!textData) return;

            const blob = new Blob([textData], { type: 'application/msword;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const temporaryLink = document.createElement('a');
            temporaryLink.href = url;
            temporaryLink.download = 'AI_Study_Notes.doc';
            
            document.body.appendChild(temporaryLink);
            temporaryLink.click();
            document.body.removeChild(temporaryLink);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
